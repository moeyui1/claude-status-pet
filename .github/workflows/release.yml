name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # Package character assets (runs once, fast)
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Download Ferris SVGs (CC0 licensed)
        run: |
          mkdir -p assets/ferris
          for i in $(seq 1 50); do
            curl -sL "https://raw.githubusercontent.com/MariaLetta/free-ferris-pack/main/illustrations/svg/$i.svg" -o "assets/ferris/$i.svg"
          done

      - name: Create asset zip
        run: cd assets && zip -r ../pet-assets.zip ferris/

      - name: Upload asset zip
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: pet-assets.zip

  # Build binaries per platform
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: claude-status-pet.exe
            asset_name: claude-status-pet-windows-x64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: claude-status-pet
            asset_name: claude-status-pet-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: claude-status-pet
            asset_name: claude-status-pet-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: claude-status-pet
            asset_name: claude-status-pet-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install npm dependencies
        working-directory: pet-app
        run: npm install

      - name: Build Tauri app
        working-directory: pet-app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
        run: npx tauri build --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp "pet-app/src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.asset_name }}"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: ${{ matrix.asset_name }}
